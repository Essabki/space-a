<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Uranus</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                display: flex;
                justify-content: center;
                align-items: center;
                width: 100%;
                height: 100vh;
                background: radial-gradient(circle at center, #0a0a1a 0%, #000000 100%);
                overflow: hidden;
            }
                        .planet {
                width: 100%;
                height: 80%;
                position: relative;
                border-radius: 20px;
                background: rgba(0, 0, 0, 0);
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: grab;
            }


            #earth-container {
                width: 100%;
                height: 100%;
                border-radius: 20px;
            }
            .mouse-hint {
                position: absolute;
                top: 15px;
                left: 15px;

                display: flex;
                align-items: center;
                gap: 8px;

                padding: 10px 14px;
                border-radius: 12px;
                background: rgba(0, 0, 0, 0.5);
                backdrop-filter: blur(6px);
                color: #ffffff;
                font-size: 14px;
                font-family: 'Segoe UI', sans-serif;
                pointer-events: none; /* doesn't block clicks */
                user-select: none;
                box-shadow: 0 0 10px rgba(0,0,0,0.3);
            }
        </style>
    </head>
    <body>
        <div class="mouse-hint">
    🖱️ <span>Use the mouse</span>
       </div>
        <div class="planet" id="planet-container">
            <div id="earth-container"></div>
        </div>

        <script src="main.js"></script>
    </body>
</html>
