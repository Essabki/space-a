<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Three.js Solar System</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
}

.instructions{
    position:absolute;
    top:10px;
    right:10px;
    color:white;
    font-size:14px;
    z-index:10;
}

.btn{
    position:absolute;
    top:10px;
    left:10px;
    background:transparent;
    border:1px solid white;
    color:white;
    border-radius:12px;
    width:30px;
    height:30px;
    cursor:pointer;
}

.btn::before{
    content:attr(data-hover);
    position:absolute;
    bottom:-35px;
    left:50%;
    transform:translateX(-50%);
    background:#333;
    color:white;
    padding:6px 10px;
    border-radius:4px;
    font-size:12px;
    white-space:nowrap;
    opacity:0;
    transition:0.2s;
}

.btn:hover::before{
    opacity:1;
}
</style>
</head>

<body>

<a href="data/planet-info/index.html">
<button class="btn" data-hover="Planet information">?</button>
</a>

<button id="pauseBtn" class="btn" style="left:50px;" data-hover="Pause planets">
⏸
</button>
<div class="instructions">
🖱️ Left drag: Orbit | Right drag: Pan | Scroll: Zoom
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
    }
}
</script>

<script type="module" src="script.js"></script>

</body>
</html>
